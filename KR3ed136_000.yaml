body:
  text: 孫真人海上仙方後集第一證有緣有分得流傳福德之人在眼前千載名傳今日遇倘然遘疾頓時痊第二證途中伏暑熱堪憐急取車輪土五錢盞內澄清湯盡服身輕體健任遊行第三證傷寒咳嗽夜無眠細碾明礬末一錢半夏橘皮薑黃煮煎湯調下化涎黏第四證魚臍瘡毒療雖難火內飛礬地上攤寒食麵糊敷貼上生肌退腫即時安第五證口瘡發作痛難言香麝銅青一處研干捻些兒頻摻上不逾時刻自然安第六證婦人産難甚艱難要覓醫方似隔山尋取路傍草鞋鼻燒灰酒下即分生第七證婦人口舌並焦乾設若遲延死不難尋取黃龍肝一具燒灰調酒是靈丹第八證迎風冷淚聽原因臘月尋桑卻有情覓取梢頭不落葉煎湯頻洗見分明第九證熱淋小便澀難漩枉費諸般湯散丸匾竹水煎連口咽方知聖藥不虛傳第十證大腸乾澀藥難攻起坐艱難脹腹中水碾芝麻尋取汁時時咽下自然通第十一證鼻中衄血湧如泉亂髮燒灰有甚難竹管將來吹入鼻收功即在一時間第十二證牙疼齒痛不堪言得法猶如遇聖仙大戟將來疼處咬名方留下古今傳第十三證遠年咳嗽不曾停醫受理冤藥不靈但用款冬花作末燒煙口吸便安寧第十四證肉中刺毒不能除無血無膿痛且枸研爛松脂為細末帛封其上便寬舒第十五證刀傷出血不能停下子秋蛾效最靈研碎燒灰傷處貼即時定止見安平第十六證小兒骨痛不能言出血流膿實可憐尋取水蛇皮一個燒灰油抹傅疼邊第十七證曾聞水瀉有何方焦炒車前子最良細末一錢調米飲只消七劑應時康第十八證裡外臁瘡久不痊令人行動痛如煎若知會取牛蹄甲油拌燒灰傅患邊第十九證人身痼冷夜無眠生用川烏細細研好醋拌調攤絹上貼教冷處暖如綿第二十證忽遭蠅子入咽喉苦腦心腸不自由尋取世間蝦蟆眼爛研咽下解均愁第二十一證木鱉川芎二味停雄黃減半共調勻用蜜為丸燒一粒自然蚊蝨不相侵第二十二證破傷風病莫遲延脫殼秋蟬四五錢緊閉牙關難治療燒灰酒下便依然第二十三證急傷寒氣聽人言此病難醫自古傳半夏酒煎薑共處時間服了便依原第二十四證凡人忽被毒蛇傷獨蒜原來力甚良切取片兒遮患處艾燒七壯自安康第二十五證犬傷何用苦憂煎幸有良方世上傳刮取磚青和牛糞磨為傷處即時痊第二十六證心頭急痛不堪當我有真人海上方匾竹醋煎連口咽病身頃刻即平康第二十七證人間龜病不能言肚裡生來硬似磚自死殭蠶白馬尿不過時刻軟如綿第二十八證眼睛內瘴淚漣漣好把心來檢藥篇但取鯉魚尋腦膽和調相處自安然第二十九證骨頭打碎最艱難尋破草鞋莫等間火里燒灰由你貼管教哭臉變歡顏第三十證湯火澆燒不可當皮膚肉爛痛非常須用雞子清調酒淋洗依然不作瘡第三十一證咽喉閉塞不能言幸有硼砂可保全搗和鹽梅如棗大口中噙化即時寬第三十二證身邊胡臭聽根源説破真方用小便夜靜頻頻承熱洗兒孫後世免流傳第三十三證多時血痢莫留延濕紙包鹽火內燃研細分為三處用白湯粥飲水調咽第三十四證懸梁自縊聽根源急急扶持地上眠老角細辛吹鼻內須臾魂魄便來還第三十五證耳聾背聽又虛鳴不問多年近歲因鼠膽尋來傾耳內有如時刻即聞聲第三十六證小兒夜哭最堪憐徹夜呻吟不得眠甲牛末兒臍上貼終宵安靜謝神天第三十七證耳間疼痛如刀割出血流膿久不幹鳩屎夜鳴吹入耳除膿消腫即時痊第三十八證一撮黑豆數枝蔥熟艾川椒共有功半碗水煎噙共漱牙疼立止顯神通第三十九證肺風赤鼻最難醫幸有良方好受持但用硫礬為細末和調茄汁最相宜第四十證小兒重舌最堪愁秀鎖將來火內燒打落屑兒為細末水調吃下即時消第四十一證脫肛陰脫兩般憂尋取鯽魚只用頭火上燒乾為細末半搽半服自然收第四十二證脫肛不止久難安海上仙方遇有緣急取蜘蛛燒搗爛塗敷肛上應時痊第四十三證乍寒乍熱卻淹延反復猶如鬼祟纏陌上蜘蛛三五個將來系在脈門邊第四十四證咽喉緊閉又何疼快取蘆都草的根好酒煎至三五滾竹筒灌入是神仙第四十五證牛膝生根擂取汁男左女右鼻中注又將好酒調藥汁雙蛾一服盡皆除第四十六證七個烏梅七個棗七個粟殼七寸草燈心七莖酒同煎赤白痢疾登時好第四十七證婦人月水不能通鼠糞燒灰立見功熱酒調時逢扁鵲只消一服顯神通第四十八證婦人乳少聽吾言買取川山甲五錢磨研米泔連夜飲乳流卻似井中泉第四十九證奶瘡腫痛叫聲連焦炒芝麻細細研燈盞油調塗上面除膿消腫即依原第五十證麝香肉桂及紅花冰水為丸共一家牛膝煎湯來送下斷胎絶産定無差第五十一證小便不禁自遺漩尋取天台烏藥研飯後服時宜米飲日須兩次每三錢第五十二證骨鯁難通苦叫天金鶯根用醋來煎入喉莫染齒牙上諸骨能教化作綿第五十三證胎前瘧疾久牽纏寒熱來期實可憐急取夜明砂作末茶調空腹服三錢第五十四證婦人崩漏血來多貫衆相同米炒和每服二錢煎醋下應知症侯自消磨第五十五證走馬牙疳齒動搖棗中包信火中燒更將黃柏同為末患處捻些立見消第五十六證嘗見婦人五心熱赤芍藥同小薄荷等分細研白湯調手掌清涼與前同第五十七證滿口生瘡痛可憐乾薑好把共黃連口中細嚼涎流中頃刻人邀可上筵第五十八證小兒吐瀉何能止滑石硫黃一處研每服一錢飲調下方知妙藥是神仙第五十九證頭風腫痛太陽邊白芷川芎同向前等分石膏同作末熱茶調下兩三錢第六十證耳聾重聽不聞言研爛細辛蠟作丸塞耳綿包鼠糞大不逾數日卻通宣第六十一證牙疼鶴蝨共甘松白芷細辛等分研為末少將牙上擦煎湯灌漱也安然第六十二證自汗不止防風末浮麥煎湯服三錢不效卻用牡蠣散二方效驗可留存第六十三證人遭犬咬痛堪憐去殼萆麻五十丸爛搗成膏傷患處又方虎骨有功能第六十四證四肢厥冷腹中疼熱水醮來拍膝彎紫黑點兒針刺破去些惡血就安痊第六十五證湯火燙痛最堪嗟楊梅皮末油調搽好酒將來調淋洗不過日下便安瘥第六十六證轉筋吐瀉實難當艾葉宣瓜煮冷湯急取食鹽安口內才方咽下得平康第六十七證老幼凡人生痹癖腸間一塊硬如石硝黃大蒜搗成膏敷貼消磨無舊迹第六十八證臁瘡細搗新黃柏輕粉同調豬膽汁敷貼仍將帛緊纏一周又把新膏易第六十九證骨鯁單方野苧根又方甘草對砂仁金鳳花子連根用三般治法盡通靈第七十證黃葵內子七十粒研爛酒調能應急婦人産難即分生免使全家垂淚泣第七十一證婦人吹奶最難當急用男梳百齒霜須使飯丸桐子大三丸酒下便清涼第七十二證痔漏脫肛人難説川椒口內目一謾空心水送兩三錢功效如神何恍惚第七十三證婦人吹奶意如何皂角燒灰蛤粉和好酒將來調八字立時數刻笑呵呵第七十四證療瘡最效豨蘞草五月五日午時討四錢細末酒調吞汗出通身真個好第七十五證細辛蓽撥及雄黃用酒研來入麝香不問蛇傷並犬咬當時吃了便安康第七十六證紫蘇陳皮橘皮蔥細末砂仁煎酒同胎氣不和心下輳腹中脹痛有神功第七十七證顛犬傷人毒可憐雄黃等分麝香研酒調頻服三兩盞不吃將來灌鼻穿第七十八證草果玄胡索最先靈脂沒藥乳香連酒調一盞宜溫服腹痛心疼似手拈第七十九證凡人痔漏痛成瘡遺種蠶蛾紙半張碗內燒灰調好酒服之去病水澆霜第八十證寒菊花兒五十團雪花同搗飯為丸鼻中搐入如棗大齒痛強如使手拈第八十一證接骨誰知甚藥佳何如覓取大蝦蟆生搗如泥塗患處杉皮夾定聖堪誇第八十二證酒能醒酒不尋常草果加煎乾葛湯解毒頻頻三五盞醒前醉後並宜嘗第八十三證凡人日夜事多忘遠志菖蒲煮作湯每旦空心嘗一碗詩書常記在心腸第八十四證世間果品甚多般性毒有無冷與寒設食中傷何藥解朴硝加麝即時安第八十五證老幼忽然患吃噫川椒生面和為丸醅湯十粒梧桐大應是仙方不妄傳第八十六證忽因覺是傷寒甚陳食茱萸須揀淨水煎一盞服空心發散風邪祛卻病第六十七證腦痛懸空在項頸急宜細碾馬牙硝好把酥來同搗合暫安鼻上自逍遙第八十八證赤眼難開不見天宣州土産好黃連便將驢奶淹三宿點上光明即豁然第八十九證眼中生翳莫能窺想是肝經蘊熱為快取蘭香七個子煎湯一服病消除第九十證幼小孩兒抱瘧子烏貓取糞最相宜七個桃仁同煎服病前一盞顯良醫第九十一證咳嗽多時如不止誰知只用干浮萍將來爛搗濃煎服一夜安眠真到明第九十二證金槍刀斧及傷殘直取黃丹對白礬最好生肌兼止痛即時傷處見平安第九十三證常山搗末取三錢四個烏梅去核研瘧疾未來調酒服須臾得吐去痰涎第九十四證世上諸般惡毒瘡更兼疥癬共良方好將驢糞燒灰糝日見皮膚復得常第九十五證兩腳筋疼拘急攣不分晝夜懶宜行快搗生薑成膏劑薄攤敷貼復依前第九十六證小便終了難得下何妙萵苣搗成泥將來作餅臍中貼能使泉流得應時第九十七證胃虛自然成節病多生寸白與蛔蟲收採蜂窩燒存性酒調一匕有神功第九十八證頭面若生乾溼癬半生半熟白明礬酒調塗上登時愈管取皮膚日下痊第九十九證若人翻胃勞多時乾柿三枚搗似泥好酒調開乘熱服此方效驗少人知第一百證血汗不止是如何驢糞燒灰不用多但取些兒吹鼻內須知此病即消磨第一百一證如人口氣臭難當但取明礬與麝香兩件相交搽齒上言談呵笑不聞揚第一百二證鼠咬皮膚最不良毒攻疼痛腫難當徑將貓糞填痕內端的公然不作瘡第一百三證肚邊痔病苦恓惶炒過胡蔓子最強細碾酒調三五服自然行步得無荒第一百四證蜈蚣蛇蠍毒非常咬著人時痛莫當我有靈丹隨手好自然薑汁和雄黃第一百五證天花粉是栝蔞根消渴能令目下痊採得無時煎白水服之口內自生泉第一百六證小腸尿血不曾疏採取新鮮劉寄奴為末茶調空腹服便中赤色自然無第一百七證灶中土是伏龍肝藥賤功殊不等間為末酒調溫口服胎衣不下是靈丹第一百八證兒在腹中要倒生渾家驚恐計無成尋取伏龍肝末服酒調一劑便分生第一百九證婦人乳汁不行時萵苣三枚研似泥好酒調開通口服任他石女也淋漓第一百十證産後咽喉苦又幹更兼咳嗽不能安豬脂胡粉同交和熟水調開服斷根第一百十一證婦人忽患陰中腫蔥白研膏入乳香貼傅逾時休洗去元來海上有奇方第一百十二證婦人陰內忽生瘡痛癢無時不可當尋討鯽魚將膽抹不逾時刻便清涼第一百十三證阿膠灰炒成珠顆乘熱將來即便研月信不調宜此末酒調一服應時行第一百十四證鐵錘火煉透中紅淬酒成溫飲一鍾專保婦人臨産難即時分娩喜相逢第一百十五證産後婦人心氣疼叫聲切切手攀拈酒調雞卵空心服一夜能教肅靜眠第一百十六證婦人産後血難住諸藥無如百草霜為末酒調乘睡服明朝立馬見平康第一百十七證産後胎衣不落身荏苒驚動一家人萆麻去殼十四個白麵同研傅足心第一百十八證急驚風與慢驚風奪命方知有大功磨水但得青礞石調下痰涎主便通第一百十九證咳嗽小兒多氣喘石膏火內慢飛炟研為細末蜜粳調一夜分明減一半第一百二十證小兒夜哭不能眠收拾燈花四五圓捻爛燈心湯化下一宵肅靜到明天第一百二十一證撮口臍風總一般十兒難得兩三痊快著薑蠶為細末蜜調塗向口中安第一百二十二證瀉痢脫肛不用愁槐花為末米湯調食前一盞頻頻進效驗如同鼓應桴第一百二十三證備急神方妙又玄真人海上古今傳家藏一本宜常讀有病方知得保全
